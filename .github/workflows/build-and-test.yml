name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'feature/*'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build
      run: bash plugins/dev-team/scripts/validate-build.sh

    - name: Test
      run: bash plugins/dev-team/scripts/validate-tests.sh
