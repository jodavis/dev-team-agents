name: Build and Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - 'feature/*'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build
      run: bash plugins/dev-team/scripts/validate-build.sh

    - name: Test
      id: test
      run: |
        bash plugins/dev-team/scripts/validate-tests.sh 2>&1 | tee test-results.log
        test_exit=${PIPESTATUS[0]}
        exit "$test_exit"

    - name: Publish test results to PR
      if: ${{ always() && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');

          const marker = '<!-- build-and-test:test-results -->';
          const logPath = 'test-results.log';
          // Keep below GitHub issue comment size limits.
          const maxLength = 60000;
          const outcome = '${{ steps.test.outcome }}';
          const status = outcome === 'success' ? '✅ Passed' : '❌ Failed';

          let log = '(test log was not generated)';
          if (fs.existsSync(logPath)) {
            log = fs.readFileSync(logPath, 'utf8');
          }
          if (log.length > maxLength) {
            log = `[truncated to last ${maxLength} characters]\nFull output is available in the workflow run logs.\n\n${log.slice(-maxLength)}`;
          }

          const body = [
            marker,
            '## build-and-test: Python test results',
            `**Status:** ${status}`,
            '',
            '<details>',
            '<summary>Test log</summary>',
            '',
            '```',
            log,
            '```',
            '</details>',
          ].join('\n');

          const { owner, repo } = context.repo;
          const issue_number = context.issue.number;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100,
          });

          const existing = comments.find((comment) =>
            comment.user?.login === 'github-actions[bot]' && comment.body?.includes(marker)
          );

          if (existing) {
            await github.rest.issues.updateComment({
              owner,
              repo,
              comment_id: existing.id,
              body,
            });
          } else {
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body,
            });
          }
